<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

.container{
margin-top:80px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.card{
background:#1e293b;
padding:30px;
margin:20px auto;
width:80%;
max-width:500px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#3b82f6,#06b6d4);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.logout{
background:#ef4444;
}
</style>

</head>
<body>

<div class="container">

<h1 id="welcome"></h1>

<div class="card">
<h3>Your Last Score</h3>
<h2 id="score"></h2>
</div>

<div class="card">
<h3>Select a Subject</h3>

<button onclick="start('web')">🌐 Web Dev</button>
<button onclick="start('python')">🐍 Python</button>
<button onclick="start('db')">🗄️ Database</button>
<button onclick="start('java')">☕ Java</button>
<button onclick="start('js')">⚡ JavaScript</button>
<button onclick="start('os')">💻 OS</button>
<button onclick="start('cn')">🌍 Networks</button>
<button onclick="start('ds')">📊 Data Structures</button>

</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>
let user = localStorage.getItem("currentUser");

if(!user){
window.location = "index.html";
}

document.getElementById("welcome").innerText = "Welcome, " + user + " 👋";
document.getElementById("score").innerText =
localStorage.getItem("score") || 0;

function start(sub){
localStorage.setItem("subject", sub);
window.location = "quiz.html";
}

function logout(){
localStorage.removeItem("currentUser");
window.location = "index.html";
}
</script>

</body>
</html>
