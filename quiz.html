let s = localStorage.getItem("subject") || "web";
let qs = bank[s];

let i = 0;
let score = 0;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function load(){
let cur = qs[i];

document.getElementById("q").innerText = cur.q;

let ops = [...cur.o];
shuffle(ops);

let html = "";
ops.forEach(v=>{
html += `<div class="option">
<input type='radio' name='o' value='${v}'> ${v}
</div>`;
});

document.getElementById("opt").innerHTML = html;
}

function next(){
let sel = document.querySelector("input[name='o']:checked");

if(!sel){
alert("Please select an answer!");
return;
}

let cur = qs[i];
let correct = cur.o[cur.a];

if(sel.value === correct){
score++;
}

i++;

if(i < qs.length){
load();
}else{
localStorage.setItem("score", score);
window.location = "result.html";
}
}

load();
