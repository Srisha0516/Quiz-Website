<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#020617,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.quiz-box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:90%;
max-width:600px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

h2{
margin-bottom:20px;
}

.option{
background:#334155;
padding:12px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.option:hover{
background:#3b82f6;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="quiz-box">
<h2 id="q"></h2>
<div id="opt"></div>
<button onclick="next()">Next</button>
</div>

<script>

let bank = {

web:[
{q:"What is the primary purpose of HTML in web development?",o:["To structure content on the web","To style web pages","To manage databases"],a:0},
{q:"Which technology is mainly responsible for styling web pages?",o:["CSS","JavaScript","Python"],a:0},
{q:"What role does JavaScript play in a website?",o:["Adds interactivity","Stores data","Design layout"],a:0},
{q:"What does DOM stand for?",o:["Document Object Model","Data Object Model","Digital Object Method"],a:0},
{q:"Which protocol is used to transfer web pages?",o:["HTTP","FTP","SMTP"],a:0},
{q:"What is a responsive website?",o:["Adapts to all devices","Loads faster","Has animations"],a:0},
{q:"What is an API used for?",o:["Communication between systems","Design UI","Store files"],a:0},
{q:"Which part handles server logic?",o:["Backend","Frontend","UI"],a:0},
{q:"What is a URL?",o:["Web address","Code","Database"],a:0},
{q:"Which language structures web content?",o:["HTML","CSS","SQL"],a:0}
]

};

let s = localStorage.getItem("subject") || "web";
let qs = bank[s];

let i = 0;
let score = 0;

// Shuffle
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function load(){
let cur = qs[i];

document.getElementById("q").innerText = cur.q;

let ops = [...cur.o];
shuffle(ops);

let html = "";
ops.forEach(v=>{
html += `<div class="option">
<input type='radio' name='o' value='${v}'> ${v}
</div>`;
});

document.getElementById("opt").innerHTML = html;
}

function next(){
let sel = document.querySelector("input[name='o']:checked");

if(!sel){
alert("Please select an answer!");
return;
}

let cur = qs[i];
let correct = cur.o[cur.a];

if(sel.value === correct){
score++;
}

i++;

if(i < qs.length){
load();
}else{
localStorage.setItem("score", score);
window.location = "result.html";
}
}

load();

</script>

</body>
</html>
