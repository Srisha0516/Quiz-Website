<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center}
.box{margin-top:100px}
input{padding:10px;margin:10px;border-radius:8px;border:none}
button{padding:10px 20px;border:none;border-radius:8px;background:#22c55e;color:white}
</style>
</head>
<body>

<div class="box">
<h2>Login / Register</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<script>
function register(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

localStorage.setItem(u,p);
alert("Registered Successfully!");
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(localStorage.getItem(u) === p){
localStorage.setItem("currentUser",u);
window.location = "dashboard.html";
}else{
alert("Invalid login!");
}
}
</script>

</body>
</html>
