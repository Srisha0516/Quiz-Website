<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">🎯 Choose Your Quiz</h1>

<div class="card-container">

    <div class="card" onclick="startQuiz('web')">
        <h2>🌐 Web Dev</h2>
        <p>HTML, CSS, JS</p>
    </div>

    <div class="card" onclick="startQuiz('python')">
        <h2>🐍 Python</h2>
        <p>Basics & Logic</p>
    </div>

    <div class="card" onclick="startQuiz('db')">
        <h2>🗄️ Database</h2>
        <p>SQL & Keys</p>
    </div>

</div>

<script>
function startQuiz(subject) {
    localStorage.setItem("subject", subject);
    window.location.href = "quiz.html";
}
</script>

</body>
</html>
