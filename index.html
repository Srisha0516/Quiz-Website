<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">🎯 Choose Your Quiz</h1>

<div class="card-container">

    <div class="card" onclick="startQuiz('web')">
        <h2>🌐 Web Dev</h2>
    </div>

    <div class="card" onclick="startQuiz('python')">
        <h2>🐍 Python</h2>
    </div>

    <div class="card" onclick="startQuiz('db')">
        <h2>🗄️ Database</h2>
    </div>

    <div class="card" onclick="startQuiz('java')">
        <h2>☕ Java</h2>
    </div>

    <div class="card" onclick="startQuiz('js')">
        <h2>⚡ JavaScript</h2>
    </div>

    <div class="card" onclick="startQuiz('os')">
        <h2>💻 OS</h2>
    </div>

    <div class="card" onclick="startQuiz('cn')">
        <h2>🌍 Networks</h2>
    </div>

    <div class="card" onclick="startQuiz('ds')">
        <h2>📊 Data Structures</h2>
    </div>

</div>

<script>
function startQuiz(subject) {
    localStorage.setItem("subject", subject);
    window.location.href = "quiz.html";
}
</script>

</body>
</html>
